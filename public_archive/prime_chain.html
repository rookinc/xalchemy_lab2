<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Prime Chain · Aletheos</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/public/prime_chain.css" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="title">Prime Chain</div>
      <div class="sub">Prime tetra birth → mirrored child attachment on f1/f2/f3</div>
      <nav class="links">
        <a href="/">Home</a>
        <a href="/tetra-instant">Instant</a>
        <a href="/tetra-fold">Fold</a>
        <a href="/field">Field</a>
      </nav>
    </header>

    <section class="stage-card">
      <div class="stage-shell">
        <svg id="stage" class="stage" viewBox="0 0 900 620" preserveAspectRatio="xMidYMid meet">
          <g id="grid-layer"></g>
          <g id="ghost-layer"></g>
          <g id="face-layer"></g>
          <g id="edge-layer"></g>
          <g id="label-layer"></g>
        </svg>
      </div>
      <div class="status-strip">
        <span>Cycle <strong id="status-cycle">1</strong></span>
        <span>Prime <strong id="status-prime">t0</strong></span>
        <span>Visible <strong id="status-children">0</strong></span>
        <span>Closure <strong id="status-closure">f4</strong></span>
        <span>Domains <strong id="status-domains">1↓ / 1↑</strong></span>
        <span>Register <strong id="status-register">WXYZTIW</strong></span>
      </div>
    </section>

    <section class="controls-card">
      <div class="button-row button-row-4">
        <button id="tick-prev" type="button">-</button>
        <button id="tick-next" type="button">+</button>
        <button id="view-chain" class="is-active" type="button">Prime chain</button>
        <button id="view-rings" type="button">Cycle² rings</button>
      </div>

      <div class="button-row button-row-4">
        <button id="toggle-prime" class="is-active" type="button">Prime</button>
        <button id="toggle-closure" class="is-active" type="button">Closure f4</button>
        <button id="toggle-upstairs" class="is-active" type="button">Upstairs</button>
        <button id="toggle-downstairs" class="is-active" type="button">Downstairs</button>
      </div>

      <div class="button-row button-row-4">
        <button id="tick-1" class="is-active" type="button">Tick 1</button>
        <button id="tick-2" type="button">Tick 2</button>
        <button id="tick-3" type="button">Tick 3</button>
        <button id="toggle-history" type="button">History</button>
      </div>

      <div class="button-row button-row-4">
        <button id="toggle-children" class="is-active" type="button">Children</button>
        <button id="toggle-labels" class="is-active" type="button">Labels</button>
        <button id="toggle-ghosts" class="is-active" type="button">Face ghosts</button>
        <button type="button" disabled>·</button>
      </div>

      <div class="button-row">
        <button id="focus-all" class="is-active" type="button">All</button>
        <button id="focus-f1" type="button">f1</button>
        <button id="focus-f2" type="button">f2</button>
        <button id="focus-f3" type="button">f3</button>
      </div>
    </section>

    <section class="readout-card">
      <div class="readout-title">Attachment readout</div>
      <pre id="readout">booting...</pre>
    </section>
  </main>

  <script type="module" src="/public/prime_chain.js"></script>
</body>
</html>
