<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>G15 Transport Shell</title>
  <link rel="stylesheet" href="/public/g15_transport_shell.css" />
</head>
<body>
  <div class="shell-page">
    <header class="shell-header">
      <div>
        <h1 id="shell-title">G15 Transport Shell</h1>
        <p id="shell-subtitle">Loading shell grammar...</p>
      </div>
      <div class="shell-stats" id="shell-stats">
        <span id="shell-vertex-count">Vertices: 15</span>
        <span id="shell-edge-count">Edges: 30</span>
      </div>
    </header>

    <main class="shell-main">
      <section class="controls-panel">
        <div class="control-group">
          <label for="lens-select">Lens</label>
          <select id="lens-select">
            <option value="sheet">Sheet lens</option>
            <option value="cube">Cube lens</option>
            <option value="tetra" selected>Tetra lens</option>
            <option value="signed">Signed-lift lens</option>
          </select>
        </div>

        <div class="control-group">
          <label for="view-select">Camera</label>
          <select id="view-select">
            <option value="front" selected>Front face</option>
            <option value="oblique">Oblique</option>
            <option value="top">Top</option>
            <option value="core">Core</option>
          </select>
        </div>

        <div class="control-group">
          <label>Host cycle</label>
          <div class="state-readout">
            <span id="state-step">step: 0</span>
            <span id="state-landmark">landmark: origin</span>
          </div>
          <div class="state-readout">
            <button id="play-toggle" type="button">Play</button>
            <button id="step-back" type="button">-1</button>
            <button id="step-forward" type="button">+1</button>
          </div>
          <div class="control-group">
            <label for="step-slider">Step scrubber</label>
            <input id="step-slider" type="range" min="0" max="59" step="1" value="0" />
          </div>
          <div class="state-readout">
            <button class="jump-step" type="button" data-step="0">0</button>
            <button class="jump-step" type="button" data-step="15">15</button>
            <button class="jump-step" type="button" data-step="30">30</button>
            <button class="jump-step" type="button" data-step="45">45</button>
            <button class="jump-step" type="button" data-step="59">59</button>
          </div>
        </div>

        <div class="control-group">
          <label>Lifted host state</label>
          <div class="state-readout" id="state-readout">
            <span id="state-frame">frame: 0</span>
            <span id="state-phase">phase: 0</span>
            <span id="state-sheet">sheet: +</span>
            <span id="state-host-pass">host_pass: 0</span>
            <span id="state-region">region: stairs</span>
          </div>
        </div>

        <div class="lens-note" id="lens-note">
          Tetra lens: simplex view of the projected host state.
        </div>
      </section>

      <section class="stage-panel">
        <div id="stage"></div>
      </section>

      <section class="legend-panel" id="legend-panel">
        <div class="legend-item">
          <span class="legend-swatch upstairs"></span>
          <span id="legend-green">Upstairs walk</span>
        </div>
        <div class="legend-item">
          <span class="legend-swatch mid"></span>
          <span id="legend-orange">Stairs / middle crossing</span>
        </div>
        <div class="legend-item">
          <span class="legend-swatch downstairs"></span>
          <span id="legend-blue">Downstairs walk</span>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/public/g15_transport_shell.js"></script>
</body>
</html>
