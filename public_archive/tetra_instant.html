<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tetra Instant · Aletheos</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/public/tetra_instant.css" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="topbar-row">
        <div>
          <div class="title">Tetra Instant</div>
          <div class="sub">Static instant schema · phase palette · chirality winding</div>
        </div>
        <nav class="header-links" aria-label="Page links">
          <a href="/">Home</a>
          <a href="/hello3d">Hello3D</a>
          <a href="/spinor-lab">Spinor Lab</a>
        </nav>
      </div>
    </header>

    <section class="stage-card">
      <div class="stage-shell">
        <svg id="instant-stage" class="stage" viewBox="0 0 900 620" preserveAspectRatio="xMidYMid meet" aria-label="Tetra instant stage">
          <g id="layer-lines"></g>
          <g id="face-polys"></g>
          <g id="spine-lines"></g>
          <g id="path-lines"></g>
          <g id="anchor-dots"></g>
          <g id="anchor-labels"></g>
        </svg>
      </div>

      <div class="telemetry">
        <span>Phase <strong id="metric-phase">subjective</strong></span>
        <span>Chirality <strong id="metric-chirality">left</strong></span>
        <span>Palette <strong id="metric-palette">CMY</strong></span>
      </div>
    </section>

    <section class="controls-card">
      <div class="control-row">
        <div class="control-label">Phase</div>
        <div class="button-grid">
          <button id="phase-subjective" class="is-active" type="button">Subjective</button>
          <button id="phase-objective" type="button">Objective</button>
        </div>
      </div>

      <div class="control-row">
        <div class="control-label">Chirality</div>
        <div class="button-grid">
          <button id="chirality-left" class="is-active" type="button">Left</button>
          <button id="chirality-right" type="button">Right</button>
        </div>
      </div>

      <div class="control-row">
        <div class="control-label">Visibility</div>
        <div class="button-grid button-grid-4">
          <button id="toggle-anchors" class="is-active" type="button">Anchors</button>
          <button id="toggle-paths" class="is-active" type="button">Paths</button>
          <button id="toggle-faces" class="is-active" type="button">Faces</button>
          <button id="toggle-layers" class="is-active" type="button">Layers</button>
        </div>
      </div>
    </section>

    <section class="info-card">
      <div class="info-title">Instant readout</div>
      <pre id="instant-readout">booting...</pre>
    </section>
  </main>

  <script type="module" src="/public/tetra_instant.js"></script>
</body>
</html>
