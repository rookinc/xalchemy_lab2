<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Field · Aletheos</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/public/field.css" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="title">Field</div>
      <div class="sub">Lawful emergence panel · seed / cluster / field</div>
      <nav class="links">
        <a href="/">Home</a>
        <a href="/tetra-instant">Instant</a>
        <a href="/tetra-fold">Fold</a>
        <a href="/hello3d">Hello3D</a>
      </nav>
    </header>

    <section class="stage-card">
      <div class="stage-shell">
        <svg id="field-stage" class="stage" viewBox="0 0 900 620" preserveAspectRatio="xMidYMid meet">
          <g id="grid-layer"></g>
          <g id="face-layer"></g>
          <g id="edge-layer"></g>
        </svg>
      </div>
      <div class="status-strip">
        <span>Preset <strong id="status-preset">Seed</strong></span>
        <span>Seed <strong id="status-seed">instant_subjective_left</strong></span>
        <span>Count <strong id="status-count">1</strong></span>
        <span>Phase mix <strong id="status-phase">0.5</strong></span>
        <span>Chirality mix <strong id="status-chirality">0.5</strong></span>
      </div>
    </section>

    <section class="controls">
      <div class="row row-3">
        <button id="preset-seed" class="is-active" type="button">Seed</button>
        <button id="preset-cluster" type="button">Cluster</button>
        <button id="preset-field" type="button">Field</button>
      </div>

      <div class="row row-2">
        <label class="stack">
          <span>Seed source</span>
          <select id="seed-select">
            <option value="instant_subjective_left">Instant · subjective · left</option>
            <option value="fold_x3">Fold x3</option>
            <option value="fold_x5">Fold x5</option>
          </select>
        </label>

        <label class="stack">
          <span>Count</span>
          <input id="count-slider" type="range" min="1" max="180" step="1" value="1" />
        </label>
      </div>

      <div class="row row-3 labels">
        <span>Spread <strong id="spread-value">1.0</strong></span>
        <span>Opacity <strong id="opacity-value">0.32</strong></span>
        <span>Edge <strong id="edge-value">0.70</strong></span>
      </div>

      <input id="spread-slider" type="range" min="0.5" max="8" step="0.1" value="1.0" />
      <input id="opacity-slider" type="range" min="0.05" max="0.8" step="0.01" value="0.32" />
      <input id="edge-slider" type="range" min="0.1" max="1" step="0.05" value="0.70" />

      <div class="row row-2 labels">
        <span>Subjective/Object mix <strong id="phase-value">0.50</strong></span>
        <span>Left/Right mix <strong id="chirality-value">0.50</strong></span>
      </div>

      <input id="phase-slider" type="range" min="0" max="1" step="0.01" value="0.50" />
      <input id="chirality-slider" type="range" min="0" max="1" step="0.01" value="0.50" />
    </section>

    <section class="readout-card">
      <div class="readout-title">Field readout</div>
      <pre id="field-readout">booting...</pre>
    </section>
  </main>

  <script type="module" src="/public/field.js"></script>
</body>
</html>
