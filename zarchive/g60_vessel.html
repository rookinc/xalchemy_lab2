<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>G60 Vessel · Aletheos</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/public/prime_chain.css" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="title">G60 Vessel</div>
      <div class="sub">AT4val[60,6] canonical host driven by cumulative occupancy</div>
      <nav class="links">
        <a href="/">Home</a>
        <a href="/spring-witness">Spring Witness</a>
        <a href="/prime-chain">Prime Chain</a>
        <a href="/field">Field</a>
      </nav>
    </header>

    <section class="stage-card">
      <div class="stage-shell">
        <svg id="stage" class="stage" viewBox="0 0 900 620" preserveAspectRatio="xMidYMid meet">
          <g id="grid-layer"></g>
          <g id="face-layer"></g>
          <g id="edge-layer"></g>
          <g id="node-layer"></g>
          <g id="label-layer"></g>
        </svg>
      </div>
      <div class="status-strip">
        <span>Host <strong id="status-host">AT4val[60,6]</strong></span>
        <span>Tick <strong id="status-tick">1</strong></span>
        <span>Nodes <strong id="status-nodes">0</strong></span>
        <span>Edges <strong id="status-edges">0</strong></span>
        <span>Faces <strong id="status-faces">0</strong></span>
        <span>Tetra <strong id="status-tetra">0</strong></span>
      </div>
    </section>

    <section class="controls-card">
      <div class="button-row button-row-2">
        <button id="tick-prev" type="button">-</button>
        <button id="tick-next" type="button">+</button>
      </div>
    </section>

    <section class="readout-card">
      <div class="readout-title">Vessel readout</div>
      <pre id="readout">booting...</pre>
    </section>
  </main>

  <script type="module" src="/public/g60_vessel.js"></script>
</body>
</html>
