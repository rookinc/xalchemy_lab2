<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Public Face</title>
  <link rel="stylesheet" href="/assets/app.css" />
  <link rel="icon" href="/assets/favicon.ico" />
  <link rel="manifest" href="/assets/manifest.webmanifest" />
</head>
<body>
  <h1>Public Face</h1>

  <div class="controls">
    <label>
      state:
      <input id="frame" type="number" value="0" min="0" step="1" />
      <input id="phase" type="number" value="0" min="0" max="1" step="1" />
    </label>
  </div>

  <div class="controls">
    <label>
      op:
      <select id="op">
        <option value="tau">tau</option>
        <option value="tau_inv">tau_inv</option>
        <option value="mu">mu</option>
      </select>
    </label>
  </div>

  <div class="controls buttons">
    <button onclick="apply()">Apply Local</button>
    <button onclick="step('tau')">τ</button>
    <button onclick="step('tau_inv')">τ⁻¹</button>
    <button onclick="step('mu')">μ</button>
    <button onclick="verify()">Verify</button>
  </div>

  <div id="status" class="status">booting...</div>

  <pre id="out"></pre>

  <script src="/assets/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/assets/sw.js");
    }
  </script>
</body>
</html>
