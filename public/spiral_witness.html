<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spiral Witness · Aletheos</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/public/spiral_witness.css" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="title">Spiral Witness</div>
      <div class="sub">Witness growth as radial transport from I</div>
      <nav class="links">
        <a href="/">Home</a>
        <a href="/prime-chain">Prime Chain</a>
        <a href="/g60-vessel">G60 Vessel</a>
        <a href="/field">Field</a>
      </nav>
    </header>

    <section class="stage-card">
      <div class="stage-shell">
        <svg id="stage" class="stage" viewBox="0 0 900 620" preserveAspectRatio="xMidYMid meet">
          <g id="grid-layer"></g>
          <g id="guide-layer"></g>
          <g id="ray-layer"></g>
          <g id="face-layer"></g>
          <g id="edge-layer"></g>
          <g id="node-layer"></g>
          <g id="label-layer"></g>
        </svg>
      </div>
      <div class="status-strip">
        <span>Tick <strong id="status-tick">1</strong></span>
        <span>Slot <strong id="status-slot">W</strong></span>
        <span>Next <strong id="status-next-slot">X</strong></span>
        <span>Join <strong id="status-join">f4</strong></span>
        <span>Sheet <strong id="status-sheet">+</strong></span>
      </div>
    </section>

    <section class="controls-card">
      <div class="button-row">
        <button id="tick-prev" type="button">-</button>
        <button id="tick-next" type="button">+</button>
      </div>
    </section>

    <section class="readout-card">
      <div class="readout-title">Spiral readout</div>
      <pre id="readout">booting...</pre>
    </section>
  </main>

  <script type="module" src="/public/spiral_witness.js"></script>
</body>
</html>
