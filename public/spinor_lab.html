<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spinor Lab · Aletheos</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/public/spinor_lab.css" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="topbar-row">
        <div>
          <div class="title">Spinor Lab</div>
          <div class="sub">G30 lifted-state console · trace first · graphics later</div>
        </div>
        <nav class="header-links" aria-label="Page links">
          <a href="/">Home</a>
          <a href="/witness">Witness</a>
          <a href="/hello3d">Hello3D</a>
        </nav>
      </div>
    </header>

    <section class="controls-card">
      <div class="button-row button-row-4">
        <button id="reset-btn" type="button">Reset</button>
        <button id="trace-btn" type="button">Run trace</button>
        <button id="verify-btn" type="button">Verify</button>
        <button id="play-btn" type="button">Play</button>
      </div>

      <div class="form-grid">
        <label class="field">
          <span>Frame</span>
          <input id="frame-input" type="number" min="0" max="14" step="1" value="0" />
        </label>

        <label class="field">
          <span>Phase</span>
          <select id="phase-input">
            <option value="0" selected>0 · subjective</option>
            <option value="1">1 · objective</option>
          </select>
        </label>

        <label class="field">
          <span>Sheet</span>
          <select id="sheet-input">
            <option value="+" selected>+</option>
            <option value="-">-</option>
          </select>
        </label>

        <label class="field">
          <span>Rate (Hz)</span>
          <input id="hz-input" type="number" min="1" max="30" step="1" value="2" />
        </label>

        <label class="field field-wide">
          <span>Op word</span>
          <input id="ops-input" type="text" value="tau,mu,g15" />
        </label>
      </div>
    </section>

    <section class="status-bar">
      <span>Status <strong id="status-text">ready</strong></span>
      <span>Start <strong id="start-text">(0,0,+)</strong></span>
      <span>Projected <strong id="projected-text">(0,0)</strong></span>
      <span>Steps <strong id="steps-text">0</strong></span>
      <span>Ops <strong id="ops-text">tau,mu,g15</strong></span>
    </section>

    <section class="console-grid">
      <section class="console-card">
        <div class="console-title">Lifted trace</div>
        <pre id="trace-output">booting...</pre>
      </section>

      <section class="console-card">
        <div class="console-title">Trace summary</div>
        <pre id="summary-output">booting...</pre>
      </section>
    </section>
  </main>

  <script type="module" src="/public/spinor_lab.js"></script>
</body>
</html>
