<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spinor Lab · Aletheos</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/public/spinor_lab.css" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="topbar-row">
        <div>
          <div class="title">Spinor Lab</div>
          <div class="sub">G30 lifted-state console · trace first · graphics later</div>
        </div>
        <nav class="header-links" aria-label="Page links">
          <a href="/">Home</a>
          <a href="/witness">Witness</a>
          <a href="/hello3d">Hello3D</a>
        </nav>
      </div>
    </header>


    <section class="stage-shell">
      <div class="stage-frame">
        <div class="stage-inner">
          <div class="stage-grid"></div>
          <div class="stage-orb"></div>

          <div class="stage-content">
            <div class="stage-kicker">Lifted witness stage</div>

            <div class="stage-viz-shell">
              <svg id="stage-viz" class="stage-viz" viewBox="0 0 900 260" preserveAspectRatio="none" aria-label="Projected witness lattice">
                <g id="stage-viz-grid"></g>
                <g id="stage-viz-path"></g>
                <g id="stage-viz-pulses"></g>
                <g id="stage-viz-nodes"></g>
                <g id="stage-viz-labels"></g>
              </svg>
            </div>

            <div class="stage-state-row">
              <div class="stage-pill">
                <span class="stage-pill-label">Lifted</span>
                <strong id="stage-live-state">(0,0,+)</strong>
              </div>
              <div class="stage-pill">
                <span class="stage-pill-label">Projected</span>
                <strong id="stage-live-projected">(0,0)</strong>
              </div>
            </div>

            <div class="stage-op-row">
              <span class="stage-op-label">Current op</span>
              <strong id="stage-current-op">start</strong>
            </div>
          </div>
        </div>
      </div>

      <div class="telemetry" id="stage-telemetry">
        <span>Status <strong id="metric-status">ready</strong></span>
        <span>Loops <strong id="metric-loops">0</strong></span>
        <span>Steps <strong id="metric-steps">0</strong></span>
        <span>End <strong id="metric-end">(0,0,+)</strong></span>
      </div>
    </section>

    <section class="controls-card">
      <div class="button-row button-row-4">
        <button id="reset-btn" type="button">Reset</button>
        <button id="trace-btn" type="button">Run trace</button>
        <button id="verify-btn" type="button">Verify</button>
        <button id="play-btn" type="button">Play</button>
      </div>

      <div class="form-grid form-grid-single">
        <label class="field field-slider">
          <span>Rate (Hz) <strong id="hz-value">2</strong></span>
          <input id="hz-input" type="range" min="2" max="60" step="1" value="2" />
        </label>
      </div>
    </section>


    <section class="console-grid console-grid-summary-only">
      <section class="console-card">
        <div class="console-title">Trace summary</div>
        <pre id="summary-output">booting...</pre>
      </section>
    </section>
  </main>

  <script type="module" src="/public/spinor_lab.js"></script>
</body>
</html>
